<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Gaming Hub | Tech Engine v3</title>
    <meta name="description" content="Advanced Web Application for premium unblocked gaming experience.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    
    <style>
        :root { --primary: #ff4500; --dark: #0a0a0a; --text: #ffffff; --card: #151515; --border: #333; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; line-height: 1.6; }
        #app-shell { display: flex; flex-direction: column; min-height: 100vh; }
        
        header { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; background: #111; }
        .search-box { margin-top: 15px; }
        .search-box input { width: 80%; max-width: 600px; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #222; color: white; outline: none; transition: 0.3s; font-family: monospace; }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,69,0,0.2); }
        
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .game-card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden; }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255,69,0,0.15); }
        .game-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); transform: scaleY(0); transition: 0.3s; }
        .game-card:hover::before { transform: scaleY(1); }
        
        .articles-section { padding: 40px 20px; background: #0f0f0f; border-top: 1px solid var(--border); margin-top: 20px; }
        .articles-container { max-width: 1200px; margin: 0 auto; }
        .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .article-card { background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .article-card:hover { background: #1a1a1a; border-color: #555; }
        
        .loading-signal { color: var(--primary); font-family: monospace; text-align: center; padding: 40px; font-size: 1.2rem; }
        
        footer { margin-top: auto; padding: 20px; text-align: center; font-size: 0.8rem; color: #666; border-top: 1px solid var(--border); font-family: monospace; background: #0a0a0a; }
        
        .btn { padding: 10px 20px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn:hover { background: var(--primary); border-color: var(--primary); }
        
        /* Tags */
        .tag { display: inline-block; padding: 3px 8px; background: #2a2a2a; color: #aaa; border-radius: 4px; font-size: 0.75rem; margin-top: 10px; margin-right: 5px; }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TechEngine v3",
      "operatingSystem": "All",
      "applicationCategory": "GameApplication",
      "author": { "@type": "Organization", "name": "TechEngine Proxy" }
    }
    </script>
</head>
<body>

    <div id="app-shell">
        <header>
            <h1 style="margin: 0; font-weight: 800; letter-spacing: -1px;">TechEngine<span style="color:var(--primary)">.v3</span></h1>
            <div class="search-box">
                <input type="text" id="mainSearch" placeholder="> Execute query (Games, WebGL, Guides)..." autocomplete="off">
            </div>
        </header>

        <main id="main-content">
            <div id="home-view">
                <div id="status-indicator" class="loading-signal">> Initializing Core Engine & Fetching Nodes...</div>
                <div id="game-grid"></div>

                <section class="articles-section">
                    <div class="articles-container">
                        <h2 style="color: var(--primary); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px;">> Technical Logs & SEO Strategies</h2>
                        <div id="articles-grid" class="articles-grid"></div>
                    </div>
                </section>
            </div>

            <div id="detail-view" style="display: none; padding: 40px 20px; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box;"></div>
        </main>

        <footer>
            Status: <span id="api-status">Connecting...</span> | Client: <span id="client-info">Scanning...</span> | Network: GitHub Edge
        </footer>
    </div>

    <script>
        let allGames = [];
        let allArticles = [];

        const homeView = document.getElementById('home-view');
        const detailView = document.getElementById('detail-view');
        const statusIndicator = document.getElementById('status-indicator');

        // 1. WASM Signal & Modern Client Diagnostics (Fixes the User-Agent Audit)
        async function bootSystem() {
            // WASM check
            try {
                const minimalWasmBytes = new Uint8Array([0, 97, 115, 109, 1, 0, 0, 0]);
                await WebAssembly.instantiate(minimalWasmBytes);
                document.getElementById('api-status').innerHTML = "Kernel Verified <span style='color:#4CAF50'>[WASM: Online]</span>";
            } catch (e) {
                document.getElementById('api-status').innerText = "WASM Fallback Active";
            }

            // Secure Client Data Check (No deprecated navigator.userAgent)
            const clientInfoSpan = document.getElementById('client-info');
            if (navigator.userAgentData) {
                const isMobile = navigator.userAgentData.mobile ? "Mobile" : "Desktop";
                const primaryBrand = navigator.userAgentData.brands[0]?.brand || "Unknown Browser";
                clientInfoSpan.innerText = `${isMobile} / ${primaryBrand}`;
            } else {
                clientInfoSpan.innerText = "Legacy Client";
            }
        }

        // 2. Data Fetching Engine
        async function initData() {
            try {
                const [gamesRes, articlesRes] = await Promise.all([
                    fetch('./data/games.json').catch(() => ({ json: () => [] })),
                    fetch('./data/articles.json').catch(() => ({ json: () => [] }))
                ]);
                
                allGames = await gamesRes.json();
                allArticles = await articlesRes.json();
                
                statusIndicator.style.display = 'none';
                renderGames(allGames);
                renderArticles(allArticles);
            } catch (error) {
                console.error("Data Engine Error:", error);
                statusIndicator.innerHTML = "<span style='color:red;'>> System Error: Failed to load data nodes.</span>";
            }
        }

        // 3. Render Functions
        function renderGames(data) {
            const grid = document.getElementById('game-grid');
            if (!data || data.length === 0) {
                grid.innerHTML = '<p style="color:#666; font-family:monospace;">> No executable games found in directory.</p>';
                return;
            }
            grid.innerHTML = data.map(game => `
                <div class="game-card" onclick="location.hash='game/${game.slug || game.id}'">
                    <h3 style="margin: 0 0 5px 0;">${game.title}</h3>
                    <p style="font-size: 0.85rem; color: #888; margin: 0;">${game.description || 'No description available.'}</p>
                    ${game.category ? `<span class="tag">#${game.category}</span>` : ''}
                </div>
            `).join('');
        }

        function renderArticles(data) {
            const grid = document.getElementById('articles-grid');
            if (!data || data.length === 0) {
                grid.innerHTML = '<p style="color:#666; font-family:monospace;">> No logs found in database.</p>';
                return;
            }
            grid.innerHTML = data.map(post => `
                <article class="article-card" onclick="location.hash='article/${post.id}'">
                    <h3 style="margin: 0; color: var(--primary);">${post.title}</h3>
                    <p style="color: #aaa; font-size: 0.9rem; margin: 10px 0;">${post.excerpt}</p>
                    <small style="color: #555; font-family: monospace;">> Timestamp: ${post.date}</small>
                </article>
            `).join('');
        }

        // 4. Unified Search Input
        document.getElementById('mainSearch').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filteredGames = allGames.filter(g => 
                (g.title && g.title.toLowerCase().includes(query)) || 
                (g.category && g.category.toLowerCase().includes(query))
            );
            const filteredArticles = allArticles.filter(a => 
                (a.title && a.title.toLowerCase().includes(query)) || 
                (a.excerpt && a.excerpt.toLowerCase().includes(query))
            );
            
            renderGames(filteredGames);
            renderArticles(filteredArticles);
        });

        // 5. SPA Router
        window.addEventListener('hashchange', async () => {
            const hash = location.hash;
            
            if(!hash) { 
                homeView.style.display = 'block';
                detailView.style.display = 'none';
                detailView.innerHTML = ''; 
                window.scrollTo(0, 0);
                return; 
            }
            
            const [type, slug] = hash.replace('#', '').split('/');
            
            homeView.style.display = 'none';
            detailView.style.display = 'block';
            window.scrollTo(0, 0);

            if(type === 'article') {
                detailView.innerHTML = `<div class="loading-signal">> Decrypting Knowledge Asset...</div>`;
                try {
                    const res = await fetch(`./data/articles/${slug}.json`);
                    if (!res.ok) throw new Error("404 Not Found");
                    const post = await res.json();
                    
                    const tagsHtml = (post.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
                    
                    detailView.innerHTML = `
                        <button class="btn" onclick="location.hash=''" style="margin-bottom: 20px;">← Back to Hub</button>
                        <h1 style="color:var(--primary); font-size: 2.5rem; margin-bottom: 5px;">${post.title}</h1>
                        <p style="color:#666; font-family: monospace; margin-top: 0;">Author: ${post.author || 'System'} | ID: ${slug}</p>
                        <div style="color:#ddd; font-size:1.1rem; line-height:1.8; margin: 30px 0;">
                            ${post.content}
                        </div>
                        <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
                            ${tagsHtml}
                        </div>
                    `;
                } catch (e) {
                    detailView.innerHTML = `
                        <div style="text-align:center; padding: 50px;">
                            <h2 style="color:red;">> Error 404: Asset not found in /data/articles/</h2>
                            <p style="color: #666;">Ensure ${slug}.json exists.</p>
                            <button class="btn" onclick="location.hash=''" style="margin-top: 20px;">← Return</button>
                        </div>
                    `;
                }
            } else if (type === 'game') {
                // Placeholder for game execution
                detailView.innerHTML = `
                    <button class="btn" onclick="location.hash=''" style="margin-bottom: 20px;">← Terminate Session</button>
                    <div style="text-align:center; padding: 50px; background: #111; border: 1px solid #333; border-radius: 8px;">
                        <h1 style="color:var(--primary);">> Initializing Environment: ${slug.toUpperCase()}</h1>
                        <p style="color:#888; font-family: monospace;">WebGL Canvas / Game Iframe will mount here.</p>
                        <div class="loading-signal">Awaiting Payload...</div>
                    </div>
                `;
            }
        });

        // Boot Sequence
        window.addEventListener('DOMContentLoaded', () => {
            bootSystem();
            initData();
            
            // Check if user landed directly on a hash URL
            if(location.hash) {
                window.dispatchEvent(new Event('hashchange'));
            }
        });
    </script>
</body>
</html>
