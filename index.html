<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Gaming Hub | Tech Engine v3</title>
    <meta name="description" content="Advanced Web Application for premium unblocked gaming experience.">
    
    <style>
        :root { --primary: #ff4500; --dark: #1a1a1a; --text: #ffffff; --card: #252525; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; line-height: 1.6; }
        #app-shell { display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 20px; border-bottom: 1px solid #333; text-align: center; }
        .search-box { margin-top: 15px; }
        .search-box input { width: 80%; padding: 12px; border-radius: 25px; border: none; background: #333; color: white; outline: none; border: 1px solid #444; }
        .search-box input:focus { border-color: var(--primary); }
        
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255,69,0,0.2); }
        
        .articles-section { padding: 20px; background: #151515; border-top: 1px solid #333; margin-top: 20px; }
        .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        .article-card { background: var(--card); padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary); cursor: pointer; transition: 0.2s; }
        .article-card:hover { background: #333; }
        
        .loading-signal { color: var(--primary); font-family: monospace; text-align: center; padding: 20px; }
        footer { margin-top: auto; padding: 20px; text-align: center; font-size: 0.8rem; color: #666; border-top: 1px solid #333; }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TechEngine v3",
      "operatingSystem": "All",
      "applicationCategory": "GameApplication",
      "author": { "@type": "Organization", "name": "TechEngine" }
    }
    </script>
</head>
<body>

    <div id="app-shell">
        <header>
            <h1>TechEngine<span style="color:var(--primary)">.v3</span></h1>
            <div class="search-box">
                <input type="text" id="mainSearch" placeholder="Execute search query (Games or Guides)...">
            </div>
        </header>

        <main id="main-content">
            <div id="status-indicator" class="loading-signal">Initializing Core Engine...</div>
            
            <div id="game-grid"></div>

            <section class="articles-section">
                <h2 style="color: var(--primary); border-bottom: 2px solid #333; padding-bottom: 10px;">Technical Logs & Guides</h2>
                <div id="articles-grid" class="articles-grid"></div>
            </section>
        </main>

        <footer>
            System Status: <span id="api-status">Connecting...</span> | Network: GitHub Edge
        </footer>
    </div>

    <script>
        let allGames = [];
        let allArticles = [];

        // 1. حقن إشارة WASM للـ SEO التقني
        async function injectWasmSignal() {
            try {
                const minimalWasmBytes = new Uint8Array([0, 97, 115, 109, 1, 0, 0, 0]);
                await WebAssembly.instantiate(minimalWasmBytes);
                const status = document.getElementById('api-status');
                status.innerText = "Kernel Verified | WASM: Online";
                status.style.color = "#4CAF50";
            } catch (e) {
                console.log("WASM Fallback Active");
            }
        }

        // 2. جلب الألعاب
        async function initGames() {
            try {
                const response = await fetch('./data/games.json');
                allGames = await response.json();
                document.getElementById('status-indicator').style.display = 'none';
                renderGames(allGames);
            } catch (error) {
                console.error("Game Engine Error:", error);
            }
        }

        // 3. جلب المقالات
        async function initArticles() {
            try {
                const res = await fetch('./data/articles.json');
                allArticles = await res.json();
                renderArticles(allArticles);
            } catch (err) {
                console.log("Article Engine Offline");
            }
        }

        function renderGames(data) {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = data.map(game => `
                <div class="game-card" onclick="location.hash='game/${game.slug}'">
                    <h3 style="margin:0">${game.title}</h3>
                    <p style="font-size:0.8rem; color:#aaa;">${game.description}</p>
                    <div style="font-size:0.7rem; color:var(--primary)">#${game.category}</div>
                </div>
            `).join('');
        }

        function renderArticles(data) {
            const grid = document.getElementById('articles-grid');
            grid.innerHTML = data.map(post => `
                <article class="article-card" onclick="location.hash='article/${post.id}'">
                    <h3 style="margin:0">${post.title}</h3>
                    <p style="color:#888; font-size:0.9rem; margin:10px 0">${post.excerpt}</p>
                    <small style="color:var(--primary)">Published: ${post.date}</small>
                </article>
            `).join('');
        }

        // محرك البحث الموحد (ألعاب + مقالات)
        document.getElementById('mainSearch').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            const filteredGames = allGames.filter(g => g.title.toLowerCase().includes(query));
            const filteredArticles = allArticles.filter(a => a.title.toLowerCase().includes(query));
            
            renderGames(filteredGames);
            renderArticles(filteredArticles);
        });

        // الـ Routing الخاص بالـ SPA
        window.addEventListener('hashchange', () => {
            const hash = location.hash;
            if(!hash) { location.reload(); return; }
            
            const [type, slug] = hash.replace('#', '').split('/');
            const main = document.getElementById('main-content');
            
            main.innerHTML = `
                <div style="padding:40px; text-align:center;">
                    <h2 style="color:var(--primary)">Loading ${type}: ${slug}...</h2>
                    <p>Executing Secure Fetch via GitHub API</p>
                    <button onclick="location.hash=''" style="padding:10px 20px; background:var(--primary); border:none; color:white; border-radius:5px; cursor:pointer">Back to Hub</button>
                </div>
            `;
        });

        // التشغيل عند التحميل
        window.addEventListener('DOMContentLoaded', () => {
            injectWasmSignal();
            initGames();
            initArticles();
        });
    </script>
</body>
</html>
