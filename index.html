<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Gaming Hub | Tech Engine v3</title>
    <meta name="description" content="Advanced Web Application for premium unblocked gaming experience with high-speed edge delivery.">
    
    <style>
        :root { --primary: #ff4500; --dark: #1a1a1a; --text: #ffffff; --card: #252525; --transition: 0.3s ease; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; line-height: 1.6; overflow-x: hidden; }
        
        #app-shell { display: flex; flex-direction: column; min-height: 100vh; }
        
        header { padding: 30px 20px; border-bottom: 1px solid #333; text-align: center; background: #111; }
        h1 { margin: 0; font-size: 2rem; letter-spacing: 1px; }
        
        .search-box { margin-top: 20px; position: relative; max-width: 600px; margin-left: auto; margin-right: auto; }
        .search-box input { 
            width: 100%; padding: 15px 25px; border-radius: 30px; border: 1px solid #444; 
            background: #222; color: white; outline: none; transition: var(--transition); font-size: 1rem;
        }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 69, 0, 0.3); }
        
        #main-content { flex: 1; padding: 20px; max-width: 1200px; margin: auto; width: 100%; box-sizing: border-box; }
        
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .game-card { 
            background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; 
            transition: var(--transition); cursor: pointer; position: relative; overflow: hidden;
        }
        .game-card:hover { border-color: var(--primary); transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .game-card h3 { margin: 0 0 10px 0; color: var(--primary); }
        .game-card p { font-size: 0.85rem; color: #bbb; margin-bottom: 15px; }
        .badge { font-size: 0.7rem; background: #333; padding: 4px 10px; border-radius: 5px; color: var(--primary); font-weight: bold; }

        .articles-section { margin-top: 50px; padding: 30px; background: #151515; border-radius: 20px; border: 1px solid #222; }
        .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .article-card { 
            background: var(--card); padding: 20px; border-radius: 12px; border-left: 5px solid var(--primary); 
            cursor: pointer; transition: var(--transition); 
        }
        .article-card:hover { background: #333; transform: scale(1.02); }
        
        .loading-signal { color: var(--primary); font-family: 'Courier New', Courier, monospace; text-align: center; padding: 40px; font-weight: bold; }
        
        footer { padding: 30px; text-align: center; font-size: 0.85rem; color: #666; border-top: 1px solid #333; background: #0f0f0f; }
        #api-status { font-weight: bold; transition: 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .page-content { animation: fadeIn 0.4s ease-out forwards; }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TechEngine v3",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Web, Windows, ChromeOS",
      "description": "High-performance unblocked gaming hub utilizing WebAssembly technology.",
      "author": { "@type": "Organization", "name": "Steal Brainrot Tech" }
    }
    </script>
</head>
<body>

    <div id="app-shell">
        <header>
            <h1>TechEngine<span style="color:var(--primary)">.v3</span></h1>
            <div class="search-box">
                <input type="text" id="mainSearch" placeholder="Execute search query (Games, Guides, Tools)...">
            </div>
        </header>

        <main id="main-content">
            <div id="status-indicator" class="loading-signal">INITIALIZING KERNEL...</div>
            
            <div id="game-grid"></div>

            <section id="articles-area" class="articles-section">
                <h2 style="margin-top:0; display:flex; align-items:center; gap:10px;">
                    <span style="width:10px; height:25px; background:var(--primary); display:inline-block;"></span>
                    Technical Logs & Guides
                </h2>
                <div id="articles-grid" class="articles-grid"></div>
            </section>
        </main>

        <footer>
            <div style="margin-bottom: 10px;">
                STATUS: <span id="api-status">CONNECTING TO EDGE...</span>
            </div>
            <div>&copy; 2026 TechEngine. Static Authority: Verified. WASM Architecture Active.</div>
        </footer>
    </div>

    <script>
        let allGames = [];
        let allArticles = [];

        // 1. WebAssembly (WASM) Signal Injection
        async function injectWasmSignal() {
            try {
                const minimalWasmBytes = new Uint8Array([0, 97, 115, 109, 1, 0, 0, 0]);
                await WebAssembly.instantiate(minimalWasmBytes);
                const status = document.getElementById('api-status');
                status.innerText = "KERNEL VERIFIED | WASM ENGINE ONLINE";
                status.style.color = "#00ff00";
            } catch (e) {
                document.getElementById('api-status').innerText = "LEGACY MODE ACTIVE";
            }
        }

        // 2. Fetch Games Data (API Simulation)
        async function initGames() {
            try {
                const response = await fetch('./data/games.json');
                allGames = await response.json();
                document.getElementById('status-indicator').style.display = 'none';
                renderGames(allGames);
            } catch (error) {
                console.error("Kernel Error (Games):", error);
            }
        }

        // 3. Fetch Articles Data
        async function initArticles() {
            try {
                const res = await fetch('./data/articles.json');
                allArticles = await res.json();
                renderArticles(allArticles);
            } catch (err) {
                console.log("Kernel Error (Articles): Asset index missing.");
            }
        }

        function renderGames(data) {
            const grid = document.getElementById('game-grid');
            if(!grid) return;
            grid.innerHTML = data.map(game => `
                <div class="game-card" onclick="location.hash='game/${game.slug}'">
                    <h3>${game.title}</h3>
                    <p>${game.description}</p>
                    <span class="badge"># ${game.category.toUpperCase()}</span>
                </div>
            `).join('');
        }

        function renderArticles(data) {
            const grid = document.getElementById('articles-grid');
            if(!grid) return;
            grid.innerHTML = data.map(post => `
                <article class="article-card" onclick="location.hash='article/${post.id}'">
                    <h3 style="margin-top:0; font-size:1.1rem;">${post.title}</h3>
                    <p style="color:#888; font-size:0.85rem; margin:10px 0;">${post.excerpt}</p>
                    <div style="font-size:0.75rem; color:var(--primary); font-weight:bold;">${post.date}</div>
                </article>
            `).join('');
        }

        // 4. Integrated Search Engine (Real-time DOM filtering)
        document.getElementById('mainSearch').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            const filteredGames = allGames.filter(g => 
                g.title.toLowerCase().includes(query) || g.category.toLowerCase().includes(query)
            );
            const filteredArticles = allArticles.filter(a => 
                a.title.toLowerCase().includes(query) || a.excerpt.toLowerCase().includes(query)
            );
            
            renderGames(filteredGames);
            renderArticles(filteredArticles);
        });

        // 5. SPA Routing System (Hash-based)
        window.addEventListener('hashchange', async () => {
            const hash = location.hash;
            const main = document.getElementById('main-content');
            
            if(!hash || hash === '#') {
                location.reload(); // Returns to main state
                return;
            }
            
            const [type, slug] = hash.replace('#', '').split('/');

            if(type === 'article') {
                main.innerHTML = `<div class="loading-signal">DECRYPTING ASSET: ${slug}...</div>`;
                try {
                    const res = await fetch(`./data/articles/${slug}.json`);
                    if(!res.ok) throw new Error();
                    const post = await res.json();
                    main.innerHTML = `
                        <div class="page-content" style="padding:20px; max-width:800px; margin:auto;">
                            <button onclick="location.hash=''" style="background:none; border:1px solid #444; color:#888; padding:5px 15px; border-radius:20px; cursor:pointer; margin-bottom:20px;">← Back to Hub</button>
                            <h1 style="color:var(--primary); font-size:2.5rem;">${post.title}</h1>
                            <div style="color:#666; margin-bottom:30px;">Ref ID: ${slug} | Authored by ${post.author || 'Admin'}</div>
                            <div style="font-size:1.15rem; color:#ddd; line-height:1.9; white-space: pre-wrap;">${post.content}</div>
                            <div style="margin-top:40px; padding:20px; background:#222; border-radius:10px;">
                                <strong style="color:var(--primary)">Keywords:</strong> ${post.tags ? post.tags.join(' / ') : 'Technical'}
                            </div>
                        </div>
                    `;
                    window.scrollTo(0,0);
                } catch (e) {
                    main.innerHTML = `<div style="text-align:center; padding:100px;"><h2>404: TECHNICAL ASSET NOT FOUND</h2><button onclick="location.hash=''">REBOOT SYSTEM</button></div>`;
                }
            } 
            
            else if(type === 'game') {
                main.innerHTML = `
                    <div class="page-content" style="padding:20px; text-align:center;">
                        <button onclick="location.hash=''" style="background:none; border:1px solid #444; color:#888; padding:5px 15px; border-radius:20px; cursor:pointer; margin-bottom:20px;">← Close Game</button>
                        <h2 style="color:var(--primary)">${slug.toUpperCase()}</h2>
                        <div style="background:#000; width:100%; aspect-ratio:16/9; border-radius:15px; border:3px solid #333; display:flex; align-items:center; justify-content:center;">
                            <div style="text-align:center;">
                                <div class="loading-signal">INITIALIZING STREAM...</div>
                                <p style="color:#444;">Sandboxed Environment for ${slug}</p>
                            </div>
                        </div>
                    </div>
                `;
                window.scrollTo(0,0);
            }
        });

        // 6. Boot Sequence
        window.addEventListener('DOMContentLoaded', () => {
            injectWasmSignal();
            initGames();
            initArticles();
        });
    </script>
</body>
</html>
