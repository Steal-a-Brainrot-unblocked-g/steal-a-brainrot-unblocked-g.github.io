<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Gaming Hub | Tech Engine v3</title>
    <meta name="description" content="Advanced Web Application for premium unblocked gaming experience.">
    
    <style>
        :root { --primary: #ff4500; --dark: #1a1a1a; --text: #ffffff; --card: #252525; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; line-height: 1.6; }
        #app-shell { display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 20px; border-bottom: 1px solid #333; text-align: center; }
        .search-box { margin-top: 15px; }
        .search-box input { width: 80%; max-width: 600px; padding: 12px; border-radius: 25px; border: none; background: #333; color: white; outline: none; border: 1px solid #444; }
        .search-box input:focus { border-color: var(--primary); }
        
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255,69,0,0.2); }
        
        .articles-section { padding: 20px; background: #151515; border-top: 1px solid #333; margin-top: 20px; }
        .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        .article-card { background: var(--card); padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary); cursor: pointer; transition: 0.2s; }
        .article-card:hover { background: #333; }
        
        .loading-signal { color: var(--primary); font-family: monospace; text-align: center; padding: 20px; }
        footer { margin-top: auto; padding: 20px; text-align: center; font-size: 0.8rem; color: #666; border-top: 1px solid #333; }
        
        /* زر العودة */
        .back-btn { padding: 10px 20px; background: #333; border: none; color: white; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .back-btn:hover { background: var(--primary); }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TechEngine v3",
      "operatingSystem": "All",
      "applicationCategory": "GameApplication",
      "author": { "@type": "Organization", "name": "TechEngine" }
    }
    </script>
</head>
<body>

    <div id="app-shell">
        <header>
            <h1>TechEngine<span style="color:var(--primary)">.v3</span></h1>
            <div class="search-box">
                <input type="text" id="mainSearch" placeholder="Execute search query (Games or Guides)...">
            </div>
        </header>

        <main id="main-content">
            <div id="home-view">
                <div id="status-indicator" class="loading-signal">Initializing Core Engine...</div>
                <div id="game-grid"></div>

                <section class="articles-section">
                    <h2 style="color: var(--primary); border-bottom: 2px solid #333; padding-bottom: 10px;">Technical Logs & Guides</h2>
                    <div id="articles-grid" class="articles-grid"></div>
                </section>
            </div>

            <div id="detail-view" style="display: none;"></div>
        </main>

        <footer>
            System Status: <span id="api-status">Connecting...</span> | Network: GitHub Edge
        </footer>
    </div>

    <script>
        let allGames = [];
        let allArticles = [];

        // تعريف واجهات العرض
        const homeView = document.getElementById('home-view');
        const detailView = document.getElementById('detail-view');
        const statusIndicator = document.getElementById('status-indicator');

        // 1. إشارة WASM 
        async function injectWasmSignal() {
            try {
                const minimalWasmBytes = new Uint8Array([0, 97, 115, 109, 1, 0, 0, 0]);
                await WebAssembly.instantiate(minimalWasmBytes);
                const status = document.getElementById('api-status');
                status.innerText = "Kernel Verified | WASM: Online";
                status.style.color = "#4CAF50";
            } catch (e) {
                console.log("WASM Fallback Active");
            }
        }

        // 2. جلب البيانات
        async function initData() {
            try {
                // استخدام Promise.all لجلب البيانات بشكل متوازٍ وأسرع
                const [gamesRes, articlesRes] = await Promise.all([
                    fetch('./data/games.json').catch(() => ({ json: () => [] })),
                    fetch('./data/articles.json').catch(() => ({ json: () => [] }))
                ]);
                
                allGames = await gamesRes.json();
                allArticles = await articlesRes.json();
                
                statusIndicator.style.display = 'none';
                renderGames(allGames);
                renderArticles(allArticles);
            } catch (error) {
                console.error("Data Engine Error:", error);
                statusIndicator.innerText = "System Error: Failed to load core data.";
                statusIndicator.style.color = "red";
            }
        }

        // 3. دوال التصيير (Render)
        function renderGames(data) {
            const grid = document.getElementById('game-grid');
            if (data.length === 0) {
                grid.innerHTML = '<p style="color:#888; padding:20px;">No games found.</p>';
                return;
            }
            grid.innerHTML = data.map(game => `
                <div class="game-card" onclick="location.hash='game/${game.slug}'">
                    <h3 style="margin:0">${game.title}</h3>
                    <p style="font-size:0.8rem; color:#aaa;">${game.description}</p>
                    <div style="font-size:0.7rem; color:var(--primary)">#${game.category}</div>
                </div>
            `).join('');
        }

        function renderArticles(data) {
            const grid = document.getElementById('articles-grid');
            if (data.length === 0) {
                grid.innerHTML = '<p style="color:#888;">No articles found.</p>';
                return;
            }
            grid.innerHTML = data.map(post => `
                <article class="article-card" onclick="location.hash='article/${post.id}'">
                    <h3 style="margin:0">${post.title}</h3>
                    <p style="color:#888; font-size:0.9rem; margin:10px 0">${post.excerpt}</p>
                    <small style="color:var(--primary)">Published: ${post.date}</small>
                </article>
            `).join('');
        }

        // 4. محرك البحث
        document.getElementById('mainSearch').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filteredGames = allGames.filter(g => g.title.toLowerCase().includes(query) || g.category.toLowerCase().includes(query));
            const filteredArticles = allArticles.filter(a => a.title.toLowerCase().includes(query));
            
            renderGames(filteredGames);
            renderArticles(filteredArticles);
        });

        // 5. نظام التوجيه (Router) المحدث
        window.addEventListener('hashchange', async () => {
            const hash = location.hash;
            
            // العودة للرئيسية (بدون Reload)
            if(!hash) { 
                homeView.style.display = 'block';
                detailView.style.display = 'none';
                detailView.innerHTML = ''; 
                window.scrollTo(0, 0);
                return; 
            }
            
            const [type, slug] = hash.replace('#', '').split('/');
            
            // إخفاء الرئيسية وإظهار واجهة التفاصيل
            homeView.style.display = 'none';
            detailView.style.display = 'block';
            window.scrollTo(0, 0);

            if(type === 'article') {
                detailView.innerHTML = `<div class="loading-signal">Fetching Knowledge Asset...</div>`;
                try {
                    const res = await fetch(`./data/articles/${slug}.json`);
                    if (!res.ok) throw new Error("Not Found");
                    const post = await res.json();
                    
                    detailView.innerHTML = `
                        <div style="padding:40px; max-width:800px; margin:auto;">
                            <h1 style="color:var(--primary)">${post.title}</h1>
                            <p style="color:#ccc; font-size:1.1rem; line-height:1.8;">${post.content}</p>
                            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
                            <div style="color:var(--primary)">Tags: ${(post.tags || []).join(', ')}</div>
                            <br>
                            <button class="back-btn" onclick="location.hash=''">← Return to Hub</button>
                        </div>
                    `;
                } catch (e) {
                    detailView.innerHTML = `
                        <div style="text-align:center; padding: 50px;">
                            <h2 style="color:red;">Error: Asset not found in /data/articles/</h2>
                            <button class="back-btn" onclick="location.hash=''">← Return to Hub</button>
                        </div>
                    `;
                }
            } else if (type === 'game') {
                // معالجة النقر على الألعاب (لم تكن موجودة سابقاً)
                detailView.innerHTML = `
                    <div style="text-align:center; padding: 50px;">
                        <h1 style="color:var(--primary)">Initializing Environment for: ${slug}</h1>
                        <p style="color:#888;">Game canvas will load here...</p>
                        <button class="back-btn" onclick="location.hash=''" style="margin-top:20px;">← Abort & Return</button>
                    </div>
                `;
            }
        });

        // التشغيل عند التحميل
        window.addEventListener('DOMContentLoaded', () => {
            injectWasmSignal();
            initData();
            
            // معالجة الهاش إذا تم الدخول لرابط مباشر
            if(location.hash) {
                window.dispatchEvent(new Event('hashchange'));
            }
        });
    </script>
</body>
</html>
