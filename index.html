<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Gaming Hub | Tech Engine v3</title>
    
    <style>
        :root { --primary: #ff4500; --dark: #0a0a0a; --text: #ffffff; --card: #151515; --border: #333; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; line-height: 1.6; }
        
        /* الهيكل العام */
        header { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; background: #111; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* البحث */
        .search-box { margin-top: 15px; }
        .search-box input { width: 80%; max-width: 600px; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #222; color: white; outline: none; font-family: monospace; }
        
        /* شبكة الألعاب والمقالات */
        #game-grid, .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; text-decoration: none; color: inherit; display: block; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .card h3 { margin: 0 0 10px 0; color: var(--primary); }
        
        /* واجهة المقال المنفرد */
        #article-view { display: none; max-width: 800px; margin: 40px auto; padding: 20px; }
        .article-content h1 { font-size: 2.5rem; color: var(--primary); }
        .article-content p { font-size: 1.1rem; color: #ccc; line-height: 1.8; }
        .btn-back { padding: 10px 20px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .btn-back:hover { background: var(--primary); }

        footer { text-align: center; padding: 40px; color: #666; font-family: monospace; border-top: 1px solid #333; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>TechEngine<span style="color:var(--primary)">.v3</span></h1>
        <div class="search-box">
            <input type="text" id="mainSearch" placeholder="> Search Games or Logs..." autocomplete="off">
        </div>
    </header>

    <div class="container">
        
        <div id="home-view">
            <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px;">> Available Nodes</h2>
            <div id="game-grid">
                </div>

            <h2 style="margin-top: 50px; border-bottom: 1px solid #333; padding-bottom: 10px;">> Technical Logs</h2>
            <div class="articles-grid">
                
                <div class="card" onclick="openArticle('nuclear-seo')">
                    <h3>Nuclear SEO Strategies</h3>
                    <p>Why WebAssembly is the future of unblocked gaming SEO.</p>
                    <small style="color: #666;">April 26, 2026</small>
                </div>

                <div class="card" onclick="openArticle('bypass-guide')">
                    <h3>Firewall Bypass Guide</h3>
                    <p>Advanced methods to access your hub anywhere.</p>
                    <small style="color: #666;">April 25, 2026</small>
                </div>

            </div>
        </div>

        <div id="article-view">
            <a href="#" onclick="closeArticle()" class="btn-back">← Back to Hub</a>
            <div id="article-content" class="article-content">
                </div>
        </div>

    </div>

    <footer>System Status: Online | Powered by GitHub Edge</footer>

    <script>
        const articlesDatabase = {
            'nuclear-seo': {
                title: 'Nuclear SEO Strategies 2026',
                date: 'April 26, 2026',
                body: `
                    <p>In 2026, standard SEO is no longer enough. To bypass filters, you must behave like an application.</p>
                    <h2>The Power of WASM</h2>
                    <p>WebAssembly (WASM) allows us to run complex code that search engines see as "Tools" rather than "Content Farms".</p>
                    <p>هذا النص تجريبي، يمكنك مسحه ووضع مقالك الطويل هنا مباشرة بكل سهولة.</p>
                `
            },
            'bypass-guide': {
                title: 'Firewall Bypass Guide',
                date: 'April 25, 2026',
                body: `
                    <p>School firewalls are tough, but GitHub Pages is tougher. Use these proxy settings to keep your connection stable.</p>
                    <h2>Method 1: Static Mirroring</h2>
                    <p>By using static mirrors, we ensure the IP address remains trusted by most security filters.</p>
                `
            }
        };

        // وظيفة فتح المقال
        function openArticle(id) {
            const article = articlesDatabase[id];
            if (article) {
                document.getElementById('home-view').style.display = 'none';
                document.getElementById('article-view').style.display = 'block';
                document.getElementById('article-content').innerHTML = `
                    <h1>${article.title}</h1>
                    <p style="color: #666; font-family: monospace;">Date: ${article.date}</p>
                    <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
                    ${article.body}
                `;
                location.hash = id; // يغير الرابط ليصبح مباشر
                window.scrollTo(0,0);
            }
        }

        // وظيفة العودة للرئيسية
        function closeArticle() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('article-view').style.display = 'none';
            location.hash = '';
        }

        // جلب الألعاب (كما كانت في الكود السابق)
        async function loadGames() {
            try {
                const res = await fetch('./data/games.json');
                const games = await res.json();
                const grid = document.getElementById('game-grid');
                grid.innerHTML = games.map(g => `
                    <div class="card">
                        <h3>${g.title}</h3>
                        <p>${g.description}</p>
                    </div>
                `).join('');
            } catch (e) { console.log("Game data offline"); }
        }

        // التعامل مع الروابط المباشرة عند تحميل الصفحة
        window.onload = () => {
            loadGames();
            const hash = location.hash.replace('#', '');
            if (hash && articlesDatabase[hash]) {
                openArticle(hash);
            }
        };
    </script>
</body>
</html>
