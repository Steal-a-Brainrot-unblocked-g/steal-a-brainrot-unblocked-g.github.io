<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Gaming Hub | Tech Engine v3</title>
    <meta name="description" content="Advanced Web Application for premium unblocked gaming experience.">
    
    <style>
        :root { --primary: #ff4500; --dark: #0a0a0a; --text: #ffffff; --card: #151515; --border: #333; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; line-height: 1.6; }
        
        header { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; background: #111; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* البحث */
        .search-box { margin-top: 15px; }
        .search-box input { width: 80%; max-width: 600px; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #222; color: white; outline: none; font-family: monospace; }
        .search-box input:focus { border-color: var(--primary); }
        
        /* شبكة الألعاب */
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255,69,0,0.15); }
        .card h3 { margin: 0 0 10px 0; color: var(--primary); }
        
        /* واجهة اللعبة */
        .btn-back { padding: 10px 20px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .btn-back:hover { background: var(--primary); }
        #game-view { display: none; text-align: center; padding: 40px 20px; }

        footer { text-align: center; padding: 40px; color: #666; font-family: monospace; border-top: 1px solid #333; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>TechEngine<span style="color:var(--primary)">.v3</span></h1>
        <div class="search-box">
            <input type="text" id="mainSearch" placeholder="> Search Games..." autocomplete="off">
        </div>
    </header>

    <div class="container">
        
        <div id="home-view">
            <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px;">> Available Nodes</h2>
            <div id="game-grid">
                </div>
        </div>

        <div id="game-view">
            <a href="#" onclick="closeGame()" class="btn-back">← Terminate Session & Return</a>
            <h1 id="game-title" style="color:var(--primary); margin-bottom: 20px;">> Initializing...</h1>
            
            <div style="background: #111; border: 1px solid #333; height: 500px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <p style="color:#888; font-family: monospace;">Game Iframe / Canvas mounts here</p>
            </div>
        </div>

    </div>

    <footer>System Status: Online | Powered by GitHub Edge</footer>

    <script>
        let allGames = [];

        // 1. جلب الألعاب من ملف JSON
        async function loadGames() {
            try {
                const res = await fetch('./data/games.json');
                allGames = await res.json();
                renderGames(allGames);
            } catch (e) {
                console.error("Game data error", e);
                document.getElementById('game-grid').innerHTML = "<p style='color:red;'>Failed to load games data.</p>";
            }
        }

        // 2. طباعة كروت الألعاب
        function renderGames(games) {
            const grid = document.getElementById('game-grid');
            if (games.length === 0) {
                grid.innerHTML = '<p style="color:#666;">No games found.</p>';
                return;
            }
            grid.innerHTML = games.map(g => `
                <div class="card" onclick="openGame('${g.slug || g.id}', '${g.title}')">
                    <h3>${g.title}</h3>
                    <p style="color: #aaa; font-size: 0.9rem; margin: 0;">${g.description}</p>
                </div>
            `).join('');
        }

        // 3. محرك البحث الخاص بالألعاب فقط
        document.getElementById('mainSearch').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allGames.filter(g => 
                (g.title && g.title.toLowerCase().includes(query)) || 
                (g.category && g.category.toLowerCase().includes(query))
            );
            renderGames(filtered);
        });

        // 4. فتح اللعبة
        function openGame(slug, title) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('game-title').innerText = '> Executing: ' + title;
            
            location.hash = 'game/' + slug;
            window.scrollTo(0, 0);
        }

        // 5. إغلاق اللعبة والعودة
        function closeGame() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('game-view').style.display = 'none';
            location.hash = '';
        }

        // 6. التشغيل عند التحميل
        window.onload = () => {
            loadGames();
            
            const hash = location.hash.replace('#', '');
            if (hash.startsWith('game/')) {
                const slug = hash.replace('game/', '');
                openGame(slug, slug.toUpperCase());
            }
        };
    </script>
</body>
</html>
